<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular background -->
  <circle cx="50" cy="50" r="48" fill="url(#gradient)" stroke="#667eea" stroke-width="2"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bot antenna -->
  <line x1="50" y1="15" x2="50" y2="25" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="12" r="4" fill="#f093fb"/>
  
  <!-- Bot head/body -->
  <rect x="25" y="25" width="50" height="45" rx="8" fill="rgba(255,255,255,0.95)"/>
  
  <!-- Eyes -->
  <circle cx="38" cy="42" r="6" fill="#667eea"/>
  <circle cx="62" cy="42" r="6" fill="#667eea"/>
  <circle cx="40" cy="40" r="2" fill="#fff"/>
  <circle cx="64" cy="40" r="2" fill="#fff"/>
  
  <!-- Smile/mouth -->
  <path d="M 35 55 Q 50 62 65 55" stroke="#764ba2" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="60" r="2" fill="#f093fb" opacity="0.6"/>
  <circle cx="70" cy="60" r="2" fill="#f093fb" opacity="0.6"/>
  
  <!-- Bottom accent -->
  <rect x="35" y="72" width="30" height="4" rx="2" fill="#667eea" opacity="0.3"/>
</svg>
