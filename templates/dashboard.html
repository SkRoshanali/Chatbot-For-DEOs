<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart DEO</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #667eea;
            font-size: 1.8rem;
        }
        .header .user-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        .stat-card .label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .chart-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2rem;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Dashboard</h1>
            <div class="user-info">
                <span id="username"></span>
                <a href="/console" class="btn btn-primary">Console</a>
                <a href="/chat" class="btn btn-secondary">Chat</a>
                <a href="/data" class="btn btn-secondary">Data</a>
                <a href="/logout" class="btn btn-secondary">Logout</a>
            </div>
        </div>

        <div id="loading" class="loading">Loading dashboard...</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="dashboard" style="display: none;">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon">👥</div>
                    <div class="value" id="totalStudents">0</div>
                    <div class="label">Total Students</div>
                </div>
                <div class="stat-card">
                    <div class="icon">📈</div>
                    <div class="value" id="avgCGPA">0.0</div>
                    <div class="label">Average CGPA</div>
                </div>
                <div class="stat-card">
                    <div class="icon">✅</div>
                    <div class="value" id="avgAttendance">0%</div>
                    <div class="label">Average Attendance</div>
                </div>
                <div class="stat-card">
                    <div class="icon">⚠️</div>
                    <div class="value" id="lowAttendance">0</div>
                    <div class="label">Low Attendance (<75%)</div>
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Subject Performance</h3>
                    <div class="chart-container">
                        <canvas id="subjectChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Attendance Distribution</h3>
                    <div class="chart-container">
                        <canvas id="attendanceChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>CGPA Distribution</h3>
                    <div class="chart-container">
                        <canvas id="cgpaChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Section-wise Performance</h3>
                    <div class="chart-container">
                        <canvas id="sectionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let charts = {};

        async function loadDashboard() {
            try {
                // Get user info
                const userRes = await fetch('/api/me');
                const userData = await userRes.json();
                document.getElementById('username').textContent = `${userData.username} (${userData.role})`;

                // Get dashboard data
                const dashRes = await fetch('/api/dashboard');
                const data = await dashRes.json();

                if (!data.success) {
                    throw new Error(data.message || 'Failed to load dashboard');
                }

                // Update stats
                document.getElementById('totalStudents').textContent = data.stats.total_students;
                document.getElementById('avgCGPA').textContent = data.stats.avg_cgpa.toFixed(2);
                document.getElementById('avgAttendance').textContent = data.stats.avg_attendance.toFixed(1) + '%';
                document.getElementById('lowAttendance').textContent = data.stats.low_attendance;

                // Create charts
                createSubjectChart(data.subject_performance);
                createAttendanceChart(data.attendance_distribution);
                createCGPAChart(data.cgpa_distribution);
                createSectionChart(data.section_performance);

                // Show dashboard
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Error loading dashboard: ' + error.message;
            }
        }

        function createSubjectChart(data) {
            const ctx = document.getElementById('subjectChart').getContext('2d');
            charts.subject = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.subject),
                    datasets: [{
                        label: 'Average External',
                        data: data.map(d => d.avg_external),
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                    }, {
                        label: 'Average Internal',
                        data: data.map(d => d.avg_internal),
                        backgroundColor: 'rgba(118, 75, 162, 0.8)',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 100 }
                    }
                }
            });
        }

        function createAttendanceChart(data) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            charts.attendance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Above 85%', '75-85%', 'Below 75%'],
                    datasets: [{
                        data: [data.above_85, data.between_75_85, data.below_75],
                        backgroundColor: [
                            'rgba(75, 192, 192, 0.8)',
                            'rgba(255, 206, 86, 0.8)',
                            'rgba(255, 99, 132, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function createCGPAChart(data) {
            const ctx = document.getElementById('cgpaChart').getContext('2d');
            charts.cgpa = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['8.0+', '6.0-8.0', 'Below 6.0'],
                    datasets: [{
                        data: [data.above_8, data.between_6_8, data.below_6],
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(118, 75, 162, 0.8)',
                            'rgba(255, 159, 64, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function createSectionChart(data) {
            const ctx = document.getElementById('sectionChart').getContext('2d');
            charts.section = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.section),
                    datasets: [{
                        label: 'Average CGPA',
                        data: data.map(d => d.avg_cgpa),
                        borderColor: 'rgba(102, 126, 234, 1)',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 10 }
                    }
                }
            });
        }

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
