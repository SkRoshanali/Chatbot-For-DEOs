<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Smart DEO</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #667eea;
            font-size: 1.8rem;
        }
        .nav-links {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .student-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
        }
        .student-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .student-item:last-child {
            border-bottom: none;
        }
        .student-item input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        .stat-box .label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 Email Notifications</h1>
            <div class="nav-links">
                <a href="/console" class="btn btn-primary">Console</a>
                <a href="/dashboard" class="btn btn-secondary">Dashboard</a>
                <a href="/chat" class="btn btn-secondary">Chat</a>
                <a href="/data" class="btn btn-secondary">Data</a>
                <a href="/logout" class="btn btn-secondary">Logout</a>
            </div>
        </div>

        <div id="alert" style="display:none;padding:14px 18px;border-radius:8px;font-size:14px;font-weight:600;margin-bottom:16px;"></div>

        <!-- Statistics -->
        <div class="card">
            <h2>At-Risk Students Overview</h2>
            <div id="statsLoading" class="loading">Loading statistics...</div>
            <div id="stats" class="stats-grid" style="display: none;">
                <div class="stat-box">
                    <div class="number" id="lowAttCount">0</div>
                    <div class="label">Low Attendance</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="poorPerfCount">0</div>
                    <div class="label">Poor Performance</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="backlogsCount">0</div>
                    <div class="label">With Backlogs</div>
                </div>
            </div>
        </div>

        <!-- Search by Roll Number -->
        <div class="card">
            <h2>🔍 Search & Send by Roll Number</h2>
            <div style="display:flex;gap:10px;margin-bottom:16px;">
                <input type="text" id="rollSearch" placeholder="Enter Roll Number (e.g. 231FA00001)" 
                    style="flex:1;padding:10px;border:1.5px solid #ddd;border-radius:6px;font-size:14px;"
                    oninput="this.value=this.value.toUpperCase()"/>
                <button onclick="searchStudent()" class="btn btn-primary" style="white-space:nowrap;">🔍 Search</button>
            </div>

            <!-- Student Result Card -->
            <div id="searchResult" style="display:none;background:#f8f9fa;border:1.5px solid #e0e0e0;border-radius:8px;padding:18px;margin-bottom:16px;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
                    <div>
                        <div style="font-size:16px;font-weight:700;color:#1a237e;" id="res_name"></div>
                        <div style="font-size:13px;color:#666;margin-top:4px;" id="res_info"></div>
                    </div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;" id="res_badges"></div>
                </div>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px;" id="res_stats"></div>

                <!-- Send form for searched student -->
                <div style="margin-top:16px;padding-top:16px;border-top:1px solid #e0e0e0;">
                    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
                        <div style="flex:1;min-width:200px;">
                            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">Notification Type</label>
                            <select id="searchNotifType" style="width:100%;padding:9px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;">
                                <option value="low_attendance">⚠️ Low Attendance Alert</option>
                                <option value="poor_performance">📉 Poor Performance Alert</option>
                            </select>
                        </div>
                        <div style="flex:1;min-width:200px;">
                            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">Recipient Email</label>
                            <input type="email" id="searchRecipientEmail" placeholder="faculty@example.com"
                                style="width:100%;padding:9px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;"/>
                        </div>
                        <button onclick="sendToSearched()" class="btn btn-primary" id="sendSearchBtn" style="padding:9px 20px;white-space:nowrap;">
                            📧 Send Notification
                        </button>
                    </div>
                </div>
            </div>

            <div id="searchMsg" style="display:none;padding:10px 14px;border-radius:6px;font-size:13px;"></div>
        </div>
        <div class="card">
            <h2>Send Individual Notifications</h2>
            <form id="notificationForm">
                <div class="form-group">
                    <label>Notification Type</label>
                    <select id="notificationType" required>
                        <option value="low_attendance">Low Attendance Alert</option>
                        <option value="poor_performance">Poor Performance Alert</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Recipient Email</label>
                    <input type="email" id="recipientEmail" placeholder="faculty@example.com" required>
                </div>
                <div class="form-group">
                    <label>Select Students</label>
                    <div id="studentListLoading" class="loading">Loading students...</div>
                    <div id="studentList" class="student-list" style="display: none;"></div>
                </div>
                <button type="submit" class="btn btn-primary">Send Notifications</button>
            </form>
        </div>

        <!-- Send Bulk Report -->
        <div class="card">
            <h2>Send Weekly Performance Report</h2>
            <form id="bulkReportForm">
                <div class="form-group">
                    <label>Recipient Email</label>
                    <input type="email" id="bulkEmail" placeholder="hod@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary">Send Report</button>
            </form>
        </div>
    </div>

    <script>
        let atRiskStudents = {};
        let searchedStudent = null;

        async function searchStudent() {
            const roll = document.getElementById('rollSearch').value.trim();
            const resultDiv = document.getElementById('searchResult');
            const msgDiv = document.getElementById('searchMsg');

            if (!roll) {
                msgDiv.textContent = '⚠️ Please enter a roll number.';
                msgDiv.style.display = 'block';
                msgDiv.style.background = '#fff3cd';
                msgDiv.style.color = '#856404';
                resultDiv.style.display = 'none';
                return;
            }

            msgDiv.textContent = '🔍 Searching...';
            msgDiv.style.display = 'block';
            msgDiv.style.background = '#e8eaf6';
            msgDiv.style.color = '#1a237e';
            resultDiv.style.display = 'none';

            try {
                const res = await fetch('/api/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: `details of ${roll}`, semester: '', batch: '' })
                });
                const data = await res.json();

                if (!data.success || data.report_type !== 'student_lookup' || !data.data) {
                    msgDiv.textContent = `❌ No student found with roll number "${roll}".`;
                    msgDiv.style.background = '#f8d7da';
                    msgDiv.style.color = '#721c24';
                    searchedStudent = null;
                    return;
                }

                searchedStudent = data.data;
                const s = searchedStudent;

                // Badges
                const attColor  = s.attendance < 65 ? '#dc3545' : s.attendance < 75 ? '#fd7e14' : '#28a745';
                const cgpaColor = s.cgpa < 5 ? '#dc3545' : s.cgpa < 6 ? '#fd7e14' : '#28a745';
                document.getElementById('res_name').textContent = `${s.name} — ${s.roll}`;
                document.getElementById('res_info').textContent = `${s.section} | ${s.department} | Sem ${s.semester} | Batch ${s.batch}`;
                document.getElementById('res_badges').innerHTML = `
                    <span style="background:${attColor};color:white;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600;">Att: ${s.attendance}%</span>
                    <span style="background:${cgpaColor};color:white;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600;">CGPA: ${s.cgpa}</span>
                    ${s.backlogs > 0 ? `<span style="background:#dc3545;color:white;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600;">Backlogs: ${s.backlogs}</span>` : ''}
                `;
                document.getElementById('res_stats').innerHTML = `
                    <div style="background:white;border:1px solid #e0e0e0;border-radius:6px;padding:10px;text-align:center;">
                        <div style="font-size:18px;font-weight:700;color:${attColor};">${s.attendance}%</div>
                        <div style="font-size:11px;color:#888;">Attendance</div>
                    </div>
                    <div style="background:white;border:1px solid #e0e0e0;border-radius:6px;padding:10px;text-align:center;">
                        <div style="font-size:18px;font-weight:700;color:${cgpaColor};">${s.cgpa}</div>
                        <div style="font-size:11px;color:#888;">CGPA</div>
                    </div>
                    <div style="background:white;border:1px solid #e0e0e0;border-radius:6px;padding:10px;text-align:center;">
                        <div style="font-size:18px;font-weight:700;color:#1a237e;">${s.internal}/50</div>
                        <div style="font-size:11px;color:#888;">Internal</div>
                    </div>
                    <div style="background:white;border:1px solid #e0e0e0;border-radius:6px;padding:10px;text-align:center;">
                        <div style="font-size:18px;font-weight:700;color:#1a237e;">${s.external}/100</div>
                        <div style="font-size:11px;color:#888;">External</div>
                    </div>
                    <div style="background:white;border:1px solid #e0e0e0;border-radius:6px;padding:10px;text-align:center;">
                        <div style="font-size:18px;font-weight:700;color:${s.backlogs>0?'#dc3545':'#28a745'};">${s.backlogs}</div>
                        <div style="font-size:11px;color:#888;">Backlogs</div>
                    </div>
                `;

                // Auto-select notification type based on student status
                if (s.attendance < 75) {
                    document.getElementById('searchNotifType').value = 'low_attendance';
                } else if (s.cgpa < 6) {
                    document.getElementById('searchNotifType').value = 'poor_performance';
                }

                resultDiv.style.display = 'block';
                msgDiv.style.display = 'none';
            } catch (err) {
                msgDiv.textContent = '❌ Error searching student: ' + err.message;
                msgDiv.style.background = '#f8d7da';
                msgDiv.style.color = '#721c24';
            }
        }

        async function sendToSearched() {
            if (!searchedStudent) return;
            const email = document.getElementById('searchRecipientEmail').value.trim();
            const type  = document.getElementById('searchNotifType').value;
            const btn   = document.getElementById('sendSearchBtn');

            if (!email) {
                showAlert('⚠️ Please enter a recipient email address.', 'error');
                return;
            }

            const origText = btn.textContent;
            btn.textContent = '⏳ Sending...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/notifications/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, email, students: [searchedStudent.roll] })
                });
                const data = await res.json();

                if (data.success) {
                    showAlert(`✅ Notification sent to ${email} for ${searchedStudent.name} (${searchedStudent.roll})`, 'success');
                    document.getElementById('searchRecipientEmail').value = '';
                } else {
                    showAlert('❌ ' + (data.message || 'Failed to send'), 'error');
                }
            } catch (err) {
                showAlert('❌ Error: ' + err.message, 'error');
            } finally {
                btn.textContent = origText;
                btn.disabled = false;
            }
        }

        // Allow Enter key to trigger search
        document.getElementById('rollSearch').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') searchStudent();
        });

        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.style.display = 'block';
            alert.style.background   = type === 'success' ? '#d4edda' : '#f8d7da';
            alert.style.color        = type === 'success' ? '#155724' : '#721c24';
            alert.style.border       = type === 'success' ? '1px solid #c3e6cb' : '1px solid #f5c6cb';
            alert.style.borderLeft   = type === 'success' ? '4px solid #28a745' : '4px solid #dc3545';
            // Scroll to alert
            alert.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => { alert.style.display = 'none'; }, 6000);
        }

        async function loadAtRiskStudents() {
            try {
                const response = await fetch('/api/notifications/at-risk');
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message || 'Failed to load students');
                }

                atRiskStudents = data;

                // Update stats
                document.getElementById('lowAttCount').textContent = data.low_attendance.length;
                document.getElementById('poorPerfCount').textContent = data.poor_performance.length;
                document.getElementById('backlogsCount').textContent = data.with_backlogs.length;
                document.getElementById('statsLoading').style.display = 'none';
                document.getElementById('stats').style.display = 'grid';

                // Populate student list
                updateStudentList();
                document.getElementById('studentListLoading').style.display = 'none';
                document.getElementById('studentList').style.display = 'block';
            } catch (error) {
                showAlert('Error loading students: ' + error.message, 'error');
            }
        }

        function updateStudentList() {
            const type = document.getElementById('notificationType').value;
            const studentList = document.getElementById('studentList');
            
            let students = [];
            if (type === 'low_attendance') {
                students = atRiskStudents.low_attendance || [];
            } else if (type === 'poor_performance') {
                students = atRiskStudents.poor_performance || [];
            }

            if (students.length === 0) {
                studentList.innerHTML = '<p style="padding: 10px; color: #6c757d;">No students found for this category.</p>';
                return;
            }

            studentList.innerHTML = students.map(s => `
                <div class="student-item">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" name="student" value="${s.roll}">
                        <span>${s.name} (${s.roll}) - ${s.section}</span>
                    </label>
                    <span style="color: #6c757d; font-size: 0.9rem;">
                        ${type === 'low_attendance' ? `Att: ${s.attendance}%` : `CGPA: ${s.cgpa}`}
                    </span>
                </div>
            `).join('');
        }

        document.getElementById('notificationType').addEventListener('change', updateStudentList);

        document.getElementById('notificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const type = document.getElementById('notificationType').value;
            const email = document.getElementById('recipientEmail').value;
            const checkboxes = document.querySelectorAll('input[name="student"]:checked');
            const students = Array.from(checkboxes).map(cb => cb.value);

            if (students.length === 0) {
                showAlert('Please select at least one student', 'error');
                return;
            }

            const btn = e.submitter || e.target.querySelector('button[type="submit"]');
            const origText = btn.textContent;
            btn.textContent = '⏳ Sending...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/notifications/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, email, students })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(`✅ Successfully sent ${data.sent} email${data.sent > 1 ? 's' : ''} to ${email}`, 'success');
                    document.getElementById('notificationForm').reset();
                    updateStudentList();
                } else {
                    showAlert('❌ ' + (data.message || 'Failed to send notifications'), 'error');
                }
            } catch (error) {
                showAlert('❌ Error sending notifications: ' + error.message, 'error');
            } finally {
                btn.textContent = origText;
                btn.disabled = false;
            }
        });

        document.getElementById('bulkReportForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('bulkEmail').value;
            const btn = e.submitter || e.target.querySelector('button[type="submit"]');
            const origText = btn.textContent;
            btn.textContent = '⏳ Sending...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/notifications/bulk-report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(`✅ Weekly report sent successfully to ${email}`, 'success');
                    document.getElementById('bulkReportForm').reset();
                } else {
                    showAlert('❌ ' + (data.message || 'Failed to send report'), 'error');
                }
            } catch (error) {
                showAlert('❌ Error sending report: ' + error.message, 'error');
            } finally {
                btn.textContent = origText;
                btn.disabled = false;
            }
        });

        // Load data on page load
        loadAtRiskStudents();
    </script>
</body>
</html>
